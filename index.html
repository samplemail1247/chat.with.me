<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Chat</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="app-shell">
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <main class="page page-user">
    <section class="panel auth-panel" id="authPanel">
      <div class="panel-badge">Supabase Realtime Chat</div>
      <h1>1-to-1 customer support</h1>
      <p class="panel-copy">
        Sign in to continue your conversation or create a new account to start chatting with support.
      </p>

      <form class="auth-form" id="authForm">
        <div class="field-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Minimum 6 characters" autocomplete="current-password" required />
        </div>

        <div class="auth-actions">
          <button class="button button-primary" type="submit" id="loginButton">Sign In</button>
          <button class="button button-secondary" type="button" id="registerButton">Create Account</button>
        </div>

        <p class="helper-text" id="authHint">Use your email and password to access your personal support chat.</p>
        <p class="status-message" id="authStatus" aria-live="polite"></p>
      </form>
    </section>

    <section class="chat-layout hidden" id="chatLayout">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Support</p>
          <h2>Your conversation</h2>
        </div>

        <div class="header-actions">
          <span class="user-chip" id="userEmailChip"></span>
          <button class="button button-ghost" id="logoutButton" type="button">Logout</button>
        </div>
      </header>

      <section class="chat-card">
        <div class="chat-messages" id="messages"></div>

        <form class="chat-input-bar" id="messageForm">
          <input
            class="chat-input"
            id="messageInput"
            type="text"
            placeholder="Type your message..."
            maxlength="2000"
            autocomplete="off"
          />
          <button class="button button-primary" id="sendButton" type="submit" disabled>Send</button>
        </form>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js"></script>
</body>
</html>
