<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Inbox</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body class="app-shell">

  <!-- Background -->
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <main class="page page-admin">

    <!-- 🔐 LOGIN PANEL -->
    <section class="panel auth-panel" id="adminAuthPanel">
      <div class="panel-badge">Admin Workspace</div>

      <h1>Support Inbox</h1>

      <p class="panel-copy">
        Sign in with your admin account to reply to customers in real time.
      </p>

      <form class="auth-form" id="adminAuthForm">

        <div class="field-group">
          <label for="adminEmail">Email</label>
          <input
            id="adminEmail"
            type="email"
            placeholder="admin@example.com"
            required
          />
        </div>

        <div class="field-group">
          <label for="adminPassword">Password</label>
          <input
            id="adminPassword"
            type="password"
            placeholder="Your password"
            required
          />
        </div>

        <div class="auth-actions">
          <button class="button button-primary" type="submit">
            Access Inbox
          </button>
        </div>

        <p class="helper-text">
          Set your admin email inside <code>reply.js</code>
        </p>

        <p class="status-message" id="adminAuthStatus"></p>

      </form>
    </section>

    <!-- 💬 MAIN ADMIN PANEL -->
    <section class="admin-layout hidden" id="adminLayout">

      <!-- 👥 SIDEBAR -->
      <aside class="sidebar">

        <div class="sidebar-header">
          <div>
            <p class="eyebrow">Realtime</p>
            <h2>Customers</h2>
          </div>

          <!-- Mobile Close -->
          <button
            class="button button-ghost icon-only mobile-only"
            id="closeSidebarButton"
            type="button"
          >
            ✕
          </button>
        </div>

        <div class="sidebar-meta">
          <span class="user-chip" id="adminEmailChip"></span>

          <button
            class="button button-ghost"
            id="adminLogoutButton"
            type="button"
          >
            Logout
          </button>
        </div>

        <!-- USER LIST -->
        <div class="user-list" id="userList"></div>

      </aside>

      <!-- 💬 CHAT AREA -->
      <section class="admin-chat">

        <!-- HEADER -->
        <header class="chat-header">

          <div class="header-main">

            <!-- Mobile Open -->
            <button
              class="button button-ghost icon-only mobile-only"
              id="openSidebarButton"
              type="button"
            >
              ☰
            </button>

            <div>
              <p class="eyebrow">Active chat</p>
              <h2 id="activeUserTitle">Select a conversation</h2>
            </div>

          </div>

          <!-- DELETE USER -->
          <button
            class="button button-danger hidden"
            id="deleteUserButton"
            type="button"
          >
            Delete User
          </button>

        </header>

        <!-- CHAT BOX -->
        <section class="chat-card">

          <!-- MESSAGES -->
          <div class="chat-messages" id="adminMessages"></div>

          <!-- INPUT -->
          <form class="chat-input-bar" id="adminMessageForm">

            <input
              class="chat-input"
              id="adminMessageInput"
              type="text"
              placeholder="Reply as admin..."
              maxlength="2000"
              disabled
            />

            <button
              class="button button-primary"
              id="adminSendButton"
              type="submit"
              disabled
            >
              Send
            </button>

          </form>

        </section>

      </section>

    </section>

  </main>

  <!-- 🔗 SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./reply.js"></script>

</body>
</html>
